<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사장 될 결심 - Cover</title>
    <!-- 고급스러운 세리프 폰트와 모던한 산세리프 폰트 조합 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 차분하고 고급스러운 미색(Warm Off-white) 배경 */
            background-color: #F5F5F3;
            font-family: 'Pretendard', sans-serif;
        }

        .cover-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 1.2s ease-out forwards;
        }

        .title {
            /* 영화 포스터 느낌의 단정하고 무게감 있는 명조체 */
            font-family: 'Noto Serif KR', serif;
            font-size: 84px;
            font-weight: 900;
            color: #191F28;
            margin: 0;
            line-height: 1.1;
            letter-spacing: -4px;
            white-space: nowrap;
        }

        .subtitle {
            font-size: 15px;
            font-weight: 500;
            color: #8B95A1;
            letter-spacing: 14px;
            margin-top: 20px;
            margin-bottom: 80px;
            text-transform: uppercase;
            /* 넓은 자간으로 인한 우측 쏠림 보정 */
            margin-right: -14px; 
        }

        .start-btn {
            font-size: 17px;
            font-weight: 600;
            color: #FFFFFF;
            background-color: #191F28;
            padding: 20px 60px;
            /* 과하지 않은, 모던하고 깔끔한 라운딩 */
            border-radius: 4px;
            text-decoration: none;
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }

        .start-btn:hover {
            background-color: #333D4B;
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.08);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="cover-container">
        <div>
            <h1 class="title">사장 될 결심</h1>
            <div class="subtitle">Business Survival Simulator</div>
        </div>
        <a href="#" class="start-btn">시작하기</a>
    </div>
</body>
</html>
