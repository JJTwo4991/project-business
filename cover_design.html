<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사장 될 결심 - Cover</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #e9e8e3;
            font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
        }

        /* 갤럭시(9:19.5) 목업 프레임 */
        .phone {
            width: 400px;
            aspect-ratio: 9 / 19.5;
            border-radius: 44px;
            background: #fdfcf8;
            box-shadow: 0 30px 80px rgba(0,0,0,0.15), 0 0 0 10px #1a1a1a, 0 0 0 12px #333;
            overflow: hidden;
            position: relative;
            background-image:
                linear-gradient(rgba(0,0,0,0.045) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.045) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* 공책 좌측 여백선 */
        .phone::before {
            content: '';
            position: absolute;
            left: 72px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(229, 99, 99, 0.25);
        }

        .cover {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            padding: 72px 32px 56px;
        }

        .decor {
            position: absolute;
            color: rgba(26, 26, 26, 0.35);
        }
        .decor-tr { top: 80px; right: 28px; transform: rotate(8deg); }
        .decor-bl { left: 36px; bottom: 160px; transform: rotate(-12deg); }

        .header {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-top: -40px;
        }

        .title-wrap {
            position: relative;
            display: inline-block;
        }

        .title {
            font-family: 'Pretendard Variable', Pretendard, sans-serif;
            font-weight: 900;
            font-size: 56px;
            line-height: 1.1;
            color: #1a1a1a;
            margin: 0;
            letter-spacing: -2.5px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.05);
            white-space: nowrap;
        }

        .underline {
            position: absolute;
            left: -8px;
            right: -8px;
            bottom: -14px;
            width: calc(100% + 16px);
            height: 14px;
        }

        .tagline {
            margin: 28px 0 0;
            font-size: 16px;
            font-weight: 500;
            color: #555;
            line-height: 1.7;
            letter-spacing: -0.3px;
        }
        .tagline strong { font-weight: 700; color: #1a1a1a; }

        .footer {
            display: flex;
            justify-content: center;
            padding-bottom: 12px;
        }

        .start-btn {
            font-family: 'Pretendard Variable', Pretendard, sans-serif;
            font-weight: 700;
            font-size: 20px;
            color: #1a1a1a;
            background: #fdfcf8;
            border: 2.5px solid #1a1a1a;
            padding: 18px 64px;
            border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
            cursor: pointer;
            letter-spacing: -0.5px;
            box-shadow: 3px 4px 0 rgba(0,0,0,0.1);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .start-btn:hover {
            transform: translate(-1px, -1px);
            box-shadow: 4px 5px 0 rgba(0,0,0,0.12);
        }
        .start-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 2px 0 rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="cover">
            <svg class="decor decor-tr" width="52" height="52" viewBox="0 0 52 52" fill="none">
                <path d="M26 4 L29 20 L45 23 L29 26 L26 42 L23 26 L7 23 L23 20 Z"
                      stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none"/>
            </svg>
            <svg class="decor decor-bl" width="44" height="44" viewBox="0 0 44 44" fill="none">
                <path d="M6 22 Q 14 6, 22 22 T 38 22"
                      stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
                <path d="M34 17 L38 22 L34 27"
                      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>

            <div class="header">
                <div class="title-wrap">
                    <h1 class="title">사장 될 결심</h1>
                    <svg class="underline" viewBox="0 0 300 14" preserveAspectRatio="none">
                        <path d="M4 8 Q 60 2, 120 7 T 240 6 T 296 9"
                              stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.85"/>
                    </svg>
                </div>
                <p class="tagline">
                    14개 업종, <strong>5분</strong>이면<br/>
                    내가 사장이 됐을 때의 수익을 그려봐요
                </p>
            </div>

            <div class="footer">
                <button class="start-btn">시작하기</button>
            </div>
        </div>
    </div>
</body>
</html>
