<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사장 될 결심 - Cover</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
            background-color: #fdfcf8;
            background-image:
                linear-gradient(rgba(0,0,0,0.045) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.045) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .cover {
            width: 100%;
            max-width: 440px;
            min-height: 100vh;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 22vh 32px 14vh;
            position: relative;
        }

        /* 공책 좌측 여백선 */
        .cover::before {
            content: '';
            position: absolute;
            left: 72px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(229, 99, 99, 0.25);
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .title {
            font-family: 'Pretendard Variable', Pretendard, sans-serif;
            font-weight: 900;
            font-size: 60px;
            line-height: 1.1;
            color: #1a1a1a;
            margin: 0;
            letter-spacing: -2.5px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.05);
            white-space: nowrap;
        }

        .footer {
            display: flex;
            justify-content: center;
            padding-bottom: 12px;
        }

        .start-btn {
            font-family: 'Pretendard Variable', Pretendard, sans-serif;
            font-weight: 800;
            font-size: 24px;
            color: #fdfcf8;
            background: #1a1a1a;
            border: none;
            padding: 22px 80px;
            border-radius: 18px;
            cursor: pointer;
            letter-spacing: -0.8px;
            box-shadow: 0 6px 0 rgba(0,0,0,0.18), 0 10px 24px rgba(0,0,0,0.1);
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }
        .start-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 7px 0 rgba(0,0,0,0.18), 0 12px 28px rgba(0,0,0,0.12);
        }
        .start-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.18), 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="cover">
        <div class="header">
            <h1 class="title">사장 될 결심</h1>
        </div>
        <div class="footer">
            <button class="start-btn">시작하기</button>
        </div>
    </div>
</body>
</html>
