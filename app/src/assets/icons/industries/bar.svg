<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667EEA" />
      <stop offset="100%" stop-color="#764BA2" />
    </linearGradient>
    
    <!-- Glossy Top Highlight Gradient -->
    <linearGradient id="glossGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>

    <!-- Inner Bottom Shadow Gradient -->
    <linearGradient id="shadowGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.0" />
    </linearGradient>

    <!-- Drop Shadow for the Icon -->
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Base Squircle -->
  <rect width="100%" height="100%" rx="12" fill="url(#bgGrad)" />
  
  <!-- Inner Bottom Shadow -->
  <rect width="100%" height="100%" rx="12" fill="url(#shadowGrad)" />

  <!-- Glossy Top Highlight -->
  <path d="M 0,12 C 0,5 5,0 12,0 L 36,0 C 43,0 48,5 48,12 C 48,24 36,28 24,28 C 12,28 0,24 0,12 Z" fill="url(#glossGrad)" />

  <!-- Icon Wrapper with Drop Shadow -->
  <g filter="url(#iconShadow)">
    <rect x="12" y="16" width="18" height="22" rx="3" fill="#ffffff"/><path d="M30 20h3c2.2 0 4 1.8 4 4v4c0 2.2-1.8 4-4 4h-3" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round"/><ellipse cx="21" cy="16" rx="10" ry="4" fill="#ffffff"/><ellipse cx="21" cy="15" rx="8" ry="3" fill="#ffffff"/><circle cx="18" cy="28" r="1.5" fill="#667EEA"/><circle cx="23" cy="24" r="1" fill="#667EEA"/><circle cx="20" cy="32" r="1" fill="#667EEA"/>
  </g>
</svg>