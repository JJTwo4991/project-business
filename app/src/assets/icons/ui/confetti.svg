<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF416C" />
      <stop offset="100%" stop-color="#FF4B2B" />
    </linearGradient>
    
    <!-- Glossy Top Highlight Gradient -->
    <linearGradient id="glossGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>

    <!-- Inner Bottom Shadow Gradient -->
    <linearGradient id="shadowGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.0" />
    </linearGradient>

    <!-- Drop Shadow for the Icon -->
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Base Squircle -->
  <rect width="100%" height="100%" rx="12" fill="url(#bgGrad)" />
  
  <!-- Inner Bottom Shadow -->
  <rect width="100%" height="100%" rx="12" fill="url(#shadowGrad)" />

  <!-- Glossy Top Highlight -->
  <path d="M 0,12 C 0,5 5,0 12,0 L 36,0 C 43,0 48,5 48,12 C 48,24 36,28 24,28 C 12,28 0,24 0,12 Z" fill="url(#glossGrad)" />

  <!-- Icon Wrapper with Drop Shadow -->
  <g filter="url(#iconShadow)">
    <path d="M10 38L22 18l8 8L12 40" fill="#ffffff"/><path d="M10 38l2-2" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/><rect x="28" y="8" width="4" height="4" rx="1" fill="#ffffff" transform="rotate(20 30 10)"/><rect x="34" y="14" width="3" height="3" rx="0.5" fill="#ffffff" transform="rotate(-15 35 15)"/><rect x="36" y="24" width="3" height="3" rx="0.5" fill="#ffffff" transform="rotate(45 37 25)"/><circle cx="30" cy="16" r="2" fill="#ffffff"/><circle cx="38" cy="10" r="1.5" fill="#ffffff"/><circle cx="22" cy="10" r="1.5" fill="#ffffff"/><path d="M26 14c4-2 8-1 10 2" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M30 20c3 0 6 1 8 4" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M16 12l1 2 2 0.5-1.5 1.5 0.5 2-2-1-2 1 0.5-2L13 14.5l2-0.5z" fill="#ffffff"/><path d="M40 30l0.7 1.5 1.5 0.3-1 1 0.3 1.5-1.5-0.7-1.5 0.7 0.3-1.5-1-1 1.5-0.3z" fill="#ffffff"/>
  </g>
</svg>