<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#11998E" />
      <stop offset="100%" stop-color="#38EF7D" />
    </linearGradient>
    
    <!-- Glossy Top Highlight Gradient -->
    <linearGradient id="glossGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>

    <!-- Inner Bottom Shadow Gradient -->
    <linearGradient id="shadowGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.0" />
    </linearGradient>

    <!-- Drop Shadow for the Icon -->
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Base Squircle -->
  <rect width="100%" height="100%" rx="8" fill="url(#bgGrad)" />
  
  <!-- Inner Bottom Shadow -->
  <rect width="100%" height="100%" rx="8" fill="url(#shadowGrad)" />

  <!-- Glossy Top Highlight -->
  <path d="M 0,8 C 0,5 5,0 8,0 L 24,0 C 27,0 32,5 32,8 C 32,16 24,20 16,20 C 8,20 0,16 0,8 Z" fill="url(#glossGrad)" />

  <!-- Icon Wrapper with Drop Shadow -->
  <g filter="url(#iconShadow)">
    <path d="M8 16h14v1c0 4-3 7-7 7s-7-3-7-7v-1z" fill="#ffffff"/><path d="M22 18h1.5c1.4 0 2.5 1.1 2.5 2.5S24.9 23 23.5 23H22" stroke="#ffffff" stroke-width="2" fill="none"/><path d="M12 13c0-1 .8-1 .8-2" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/><path d="M16 12c0-1 .8-1 .8-2" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>